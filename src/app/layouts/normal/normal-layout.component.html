<div class="row no-gutters">
    <div class="col-lg-12">
        <div #main class="layout-main">

            <!-- Header -->
            <header class="layout-header">
                <jm-header></jm-header>
            </header>

            <!-- Content -->
            <section class="layout-content" [@routeAnimations]="outlet.isActivated && outlet.activatedRoute.component.name">
                <router-outlet #outlet="outlet"></router-outlet>
            </section>

            <!-- Footer -->
            <footer class="layout-footer">
                <jm-footer></jm-footer>
            </footer>

        </div>
    </div>
</div>
